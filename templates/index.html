<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>远程摄像头 - 选择模式</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0c0e1a 0%, #1a1c3a 40%, #2d1b4e 70%, #0c0e1a 100%);
            color: #e0e0e0;
            overflow: hidden;
        }

        /* 背景动画粒子 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(120, 80, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(0, 200, 255, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(255, 100, 200, 0.04) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(2deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #7c5cff, #00c8ff, #ff6ec7);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            margin-bottom: 8px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 200% center; }
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 50px;
        }

        .cards {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            width: 280px;
            padding: 40px 30px;
            border-radius: 24px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 24px 24px 0 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover::before { opacity: 1; }

        .card.camera-card::before {
            background: linear-gradient(90deg, #7c5cff, #a78bfa);
        }

        .card.viewer-card::before {
            background: linear-gradient(90deg, #00c8ff, #67e8f9);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .card .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }

        .card h2 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .card p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            line-height: 1.6;
        }

        .card .arrow {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
        }

        .card:hover .arrow {
            opacity: 1;
            transform: translateX(0);
        }

        @media (max-width: 640px) {
            .cards { flex-direction: column; align-items: center; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📡</div>
        <h1>远程摄像头</h1>
        <p class="subtitle">手机采集画面 · 电脑实时查看</p>

        <div class="cards">
            <a href="/camera" class="card camera-card">
                <span class="icon">📱</span>
                <h2>手机端</h2>
                <p>打开摄像头，将画面实时传输到电脑。支持前后摄像头切换。</p>
                <div class="arrow">→ 进入</div>
            </a>

            <a href="/viewer" class="card viewer-card">
                <span class="icon">🖥️</span>
                <h2>电脑端</h2>
                <p>实时查看手机传输过来的摄像头画面，支持全屏显示。</p>
                <div class="arrow">→ 进入</div>
            </a>
        </div>
    </div>
</body>
</html>
